<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F.R.I.D.A.Y. MEMORY CORE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }
    nav {
      background: #111;
      border-bottom: 1px solid #00d4ff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    nav .brand {
      color: #00d4ff;
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: 2px;
    }
    nav a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }
    nav a:hover { color: #00d4ff; }
    main { padding: 2rem; max-width: 900px; margin: 0 auto; }
    a { color: #00d4ff; }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card .id { color: #555; font-size: 0.75rem; }
    .card .content { color: #e0e0e0; margin: 0.5rem 0; }
    .card .meta { color: #555; font-size: 0.75rem; }
    .badge {
      display: inline-block;
      background: #00d4ff22;
      color: #00d4ff;
      border: 1px solid #00d4ff44;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      font-size: 0.7rem;
    }
    input, textarea {
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: inherit;
      padding: 0.5rem;
      border-radius: 3px;
    }
    button {
      background: #00d4ff;
      color: #000;
      border: none;
      padding: 0.4rem 1rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 3px;
      font-weight: bold;
    }
    button:hover { opacity: 0.85; }
    .btn-danger { background: #ff4444; color: #fff; }
    input[type="text"] { width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #222; }
    th { color: #00d4ff; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">F.R.I.D.A.Y. MEMORY CORE</span>
    <a href="/">Home</a>
    <a href="/search">Search</a>
    <a href="/stats">Stats</a>
    <a href="/export">Export JSON</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
